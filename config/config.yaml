# ─────────────────────────────────────────────────────────────────────────────
# adbot — non-secret operator config for STOCK BLOOM《1 分钟短线交易盈利营》(Soo Cheng / MY)
# Secrets live in .env (see .env.example).  Edit the XXXXXXXX placeholders before
# the first live run.  `python -m adbot doctor` validates everything here.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  ad_account_id: "act_2282909119125229"          # NEW account (new Business Portfolio); switched 2026-06-23 after the old MyTrade50 account was disabled
  page_id: "1001334883061622"                     # FB Page the ads run under (ads_get_ad_account_pages)
  instagram_user_id: "17841480427751602"                 # IG Business Account @soochenginvesting; null to omit
  pixel_id: "2602956993413536"                    # pixel / dataset id for lead tracking (ads_get_datasets)

  objective: "OUTCOME_SALES"              # matches your live "Sales" / BROAD META ANDRO template
  optimization_goal: "OFFSITE_CONVERSIONS"   # "Maximize number of conversions"
  conversion_event: "COMPLETE_REGISTRATION"  # Ads Manager "Complete registration" (custom_event_type)
  special_ad_categories: ["FINANCIAL_PRODUCTS_SERVICES"]   # declared per owner 2026-06-23 (financial vertical, MY); NOTE: forces broad targeting
                                         #   for trading/investment ads, which forces broad targeting

  lead_destination:
    type: "WEBSITE"                      # WEBSITE (chosen) | INSTANT_FORM | MESSENGER | WHATSAPP
    link_url: "https://soochenginvesting.com/"
  conversion_domain: "https://soochenginvesting.com/"   # required by Meta for website-conversion ads
  call_to_action: "LEARN_MORE"             # e.g. SIGN_UP / LEARN_MORE / GET_OFFER / SUBSCRIBE
  url_tags: "utm_source={{adset.name}}&utm_medium={{placement}}&utm_campaign={{campaign.name}}&utm_content={{ad.name}}"

  budget:
    level: "CAMPAIGN"                    # CBO — campaign-level budget (all ads use CBO)
    daily_amount_myr: 200                # campaign daily budget (MYR); kept under the new account's ~RM208 Meta daily limit
    currency: "MYR"
    adset_min_spend_myr: 50              # per-ad-set minimum daily spend (>=50) -> daily_min_spend_target

  targeting:
    countries: ["MY"]
    age_min: 25
    age_max: 65
    advantage_audience: 1                # 1 = Broad / Advantage+ ON (age 25 = floor). 0 = hard 25+ cap.
    locales: [1004]                      # ad-set Languages = Chinese (All)
    excluded_custom_audiences:           # don't pay to re-reach people who already converted; names
      - "30 days complete registration"  #   resolved to ids on the live account at build time


  build:
    creatives_per_adset: 10              # the "10" in 1-1-10
    activate_after_build: false          # build PAUSED for review; activate in the UI after checking the ad set / Advantage+

naming:
  prefix: "STOCKBLOOM"                   # name prefix for every entity this bot manages (scoping)
  weekly_off_label: "ADBOT_WEEKLY_OFF"   # label marking ads paused by the Wed OFF job (resumed Thu)

drive:
  creatives_folder_id: "1j4jWK5qVxL3mGM5WrU6TloHP-tV4kzmy"   # root folder with videos / images / carousel subfolders
  carousel_subfolder_marker: "carousel"     # a subfolder whose name contains this = one carousel set
  script_sidecar_ext: ".txt"                # per-asset script/brief: same basename, this extension

google_docs:
  caption_log_doc_id: ""                 # existing Doc id for caption+headline log (empty -> create)
  idea_backlog_doc_id: ""                # existing Doc id for content-idea backlog (empty -> create)

notion:                                  # build pulls approved copy from here (source of truth)
  enabled: true                          # needs NOTION_TOKEN secret + DB shared with the integration
  database_id: "89582b42449682d4ab7f01c223c9969b"   # 🎬 Stock Bloom Content Pipeline DB
                                         #   row Title "Video N：标题" -> content_id video_N + ad name;
                                         #   Hook -> ad headline; page body -> caption. Status NOT filtered.

kpi:
  cpl_threshold_myr: 40.00               # pause an ad above this CPL (project target RM35-40; ceiling 40)
  cpl_min_spend_myr: 80.00               # only judge an ad once it has spent >= RM80 (2x ceiling) — enough to be fair
  cpl_lookback: "week_thu"               # week-to-date from Thursday (the weekly ON/reset) — the window you review; or a Meta preset like last_3d
  pause_zero_lead_after_spend: true      # spent >= RM80 with 0 results -> infinite CPL -> pause
  cpl_hold: []                           # cleared 2026-06-28 (holds expired / weak-conversion angles); add an ad-name substring here to exempt an ad from auto-pause

cpa:                                     # cost per real PAID acquisition (joins the Paid Student List sheet)
  enabled: true
  spreadsheet_id: "1NMtGKVHRYFSsUw3-dacNPYDZABcYKi6VZgMR0u_oZRE"   # "STOCK BLOOM Register and OTO, Purchase list"
  sales_tab: "Paid Student List"         # the tab to read (one paid enrolment per row, with UTM + date)
  price_myr: 2399.00                     # default pax price; the sheet's Amount column overrides per row
  target_myr: 720.00                     # primary target CPA
  healthy_max_myr: 800.00                # end of the healthy range (NOT an auto-pause line)
  max_acceptable_myr: 960.00             # above here -> pause candidate after diagnosis + conversion time
  hard_stop_myr: 1200.00                 # above here (with real sales) -> auto-pause
  conversion_days: 14                    # registrations take time to convert; don't judge CPA until this old
  min_spend_myr: 1000.00                 # need >= this spend before a CPA verdict is fair

schedule:                                # informational; the real schedule lives in the Routine triggers
  timezone: "Asia/Kuala_Lumpur"          # GMT+8 (no DST)
  weekly_off: { day: "WED", time: "15:00" }   # pause ALL            -> UTC cron 0 7 * * 3
  weekly_on:  { day: "THU", time: "00:00" }   # resume what Wed paused -> UTC cron 0 16 * * 3
  monitor_interval_hours: 1
