name: adbot · CPA preview (manual)

# Manual, read-only: reads the Paid Student List tab and prints the parsed sales
# attribution + the service-account email to share the sheet with. No writes, no pauses.

on:
  workflow_dispatch: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: CPA preview
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/cpa_preview.py
