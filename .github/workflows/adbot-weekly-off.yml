name: adbot · weekly OFF (Wed 15:00 MYT)

# Pauses every active ad in the account (whole-account: MTC + STOCKBLOOM) and labels them,
# so weekly-on can resume exactly this set.
# Cron is UTC: Wed 07:00 UTC == Wed 15:00 Asia/Kuala_Lumpur (GMT+8).

on:
  schedule:
    - cron: "9 7 * * 3"        # Wed 15:09 MYT (off the congested ":00" slot)
    - cron: "9 8 * * 3"        # Wed 16:09 MYT — backup if the first was dropped (re-pause is a no-op)
  workflow_dispatch: {}

concurrency:
  group: adbot-weekly
  cancel-in-progress: false

jobs:
  weekly-off:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Pause all managed ads (weekly OFF)
        env:
          # pip install . is non-editable, so settings.py lands in site-packages and its
          # __file__-relative repo-root guess misses config/config.yaml. Point it at the checkout.
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python -m adbot weekly_off
