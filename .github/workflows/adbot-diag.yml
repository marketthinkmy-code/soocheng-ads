name: adbot · token diag (manual)

# Manual, read-only credential diagnostic. Prints only credential shapes (lengths/
# booleans) and which Graph call fails — never the secret values. Safe to delete
# once the (#200) 'Provide valid app ID' issue is resolved.

on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Diagnose credentials
        env:
          ADBOT_ROOT: ${{ github.workspace }}
          ADBOT_CONFIG: ${{ github.workspace }}/config/config.yaml
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: python scripts/diag_token.py
